name: Windows Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

      - name: Publish (self-contained single file)
        run: |
          dotnet publish src/Kaya.Wpf -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish

      - name: Install WiX v5
        run: dotnet tool install --global wix --version 5.0.2

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-nightly" >> "$GITHUB_OUTPUT"
          fi

      - name: Add WiX UI extension
        run: wix extension add WixToolset.UI.wixext/5.0.2

      - name: Build MSI
        run: |
          wix build packaging/SaveButton.wxs `
            -ext WixToolset.UI.wixext `
            -d PublishDir=publish `
            -d ProductVersion=${{ steps.version.outputs.version }} `
            -o SaveButton-${{ steps.version.outputs.version }}-x64.msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaveButton-${{ steps.version.outputs.version }}-x64.msi
          path: SaveButton-${{ steps.version.outputs.version }}-x64.msi

  release:
    name: Attach to Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: SaveButton-${{ steps.version.outputs.version }}-x64.msi

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SaveButton-${{ steps.version.outputs.version }}-x64.msi
